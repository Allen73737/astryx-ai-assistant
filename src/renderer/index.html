<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JARVIS-X — Local AI Desktop Assistant" />
    <title>JARVIS-X</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("GLOBAL ERROR:", message, error);
        const div = document.createElement('div');
        div.style.position = 'absolute';
        div.style.top = '0';
        div.style.left = '0';
        div.style.zIndex = '9999';
        div.style.background = 'red';
        div.style.color = 'white';
        div.style.padding = '20px';
        div.innerText = "Error: " + message + "\n" + (error ? error.stack : '');
        document.body.appendChild(div);
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
